# Backend Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: secure-mail-analyzer-backend:latest
          imagePullPolicy: Never
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres;Port=5432;Database=securemail;Username=postgres;Password=sifre123"
            - name: AdminSettings__Password
              value: admin123
            - name: AdminSettings__Token
              value: gizli-admin-anahtari-2026
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 5159
      targetPort: 8080
      nodePort: 30059
  type: NodePort